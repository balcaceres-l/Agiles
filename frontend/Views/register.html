<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Banco Prime</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="card" style="max-width: 520px; margin: 0 auto;">
        <h1 class="header-title">Registro</h1>
        <p class="header-text">Crea tu cuenta para comenzar a gestionar tus productos bancarios de forma ágil.</p>
        <div class="form-group">
          <label for="register-name">Nombre completo</label>
          <input id="register-name" type="text" placeholder="Nombre completo" />
        </div>
        <div class="form-group">
          <label for="register-email">Correo electrónico</label>
          <input id="register-email" type="email" placeholder="nombre@ejemplo.com" />
        </div>
        <div class="form-group">
          <label for="register-password">Contraseña</label>
          <input id="register-password" type="password" placeholder="********" />
        </div>
        <button class="button-primary" type="button">Crear cuenta</button>
        <button class="button-secondary" type="button" onclick="window.location.href='dashboard.html'">Ver panel</button>
        <p style="margin-top: 22px; color: #64748b;">¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
      </div>
    </main>
  </body>
</html>
