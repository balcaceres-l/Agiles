<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estado de cuenta mensual - Banco Prime</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="statement-header">
        <div>
          <h1>Estado de cuenta mensual</h1>
          <p class="header-text">Revisa el resumen del mes seleccionado con detalle de transacciones, comisiones y saldos.</p>
          <p id="statement-account" class="header-text" style="font-weight: 700; color: #0f172a;"></p>
        </div>
        <div class="statement-filters">
          <label>
            Mes
            <select id="statement-month">
              <option value="03">Marzo</option>
              <option value="04">Abril</option>
              <option value="05">Mayo</option>
            </select>
          </label>
          <label>
            Año
            <select id="statement-year">
              <option value="2026">2026</option>
              <option value="2025">2025</option>
            </select>
          </label>
          <a class="button-secondary" href="dashboard.html">Volver al panel</a>
        </div>
      </div>

      <div id="statement-summary"></div>

      <div class="section-card">
        <h2>Detalle de transacciones</h2>
        <div class="table-responsive">
          <table class="table-dashboard">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Descripción</th>
                <th>Tipo</th>
                <th>Importe</th>
              </tr>
            </thead>
            <tbody id="statement-transactions"></tbody>
          </table>
        </div>
      </div>

      <p id="statement-total-movements" class="statement-footer"></p>
    </main>
    <script type="module">
      import { initMonthlyStatement } from '../components/monthlyStatement.js';
      initMonthlyStatement();
    </script>
  </body>
</html>
