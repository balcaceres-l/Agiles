<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil de usuario - Banco Prime</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="section-card" style="max-width: 760px; margin: 0 auto;">
        <h1>Perfil de usuario</h1>
        <p class="header-text">Aquí puedes ver los datos básicos de tu usuario y regresar al panel principal.</p>
        <div class="summary-grid" style="grid-template-columns: 1fr;">
          <div class="summary-card">
            <div class="summary-card-header">
              <strong>Nombre de usuario</strong>
            </div>
            <div class="summary-card-details">
              <div class="summary-detail-row"><span>Nombre</span><strong>Juan Pérez</strong></div>
              <div class="summary-detail-row"><span>Correo</span><strong>juan.perez@ejemplo.com</strong></div>
              <div class="summary-detail-row"><span>Teléfono</span><strong>+56 9 1234 5678</strong></div>
              <div class="summary-detail-row"><span>Rol</span><strong>Cliente</strong></div>
            </div>
            <div style="display: flex; gap: 14px; flex-wrap: wrap; margin-top: 18px;">
              <a class="button-secondary" href="dashboard.html">Volver al panel</a>
              <button class="button-primary" type="button" onclick="window.location.href='login.html'">Cerrar sesión</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
