<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Banco Prime</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="card" style="max-width: 520px; margin: 0 auto;">
        <h1 class="header-title">Iniciar sesión</h1>
        <p class="header-text">Accede a tu panel bancario con seguridad y administra tus cuentas desde un diseño limpio.</p>
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input id="login-email" type="email" placeholder="nombre@ejemplo.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input id="login-password" type="password" placeholder="********" />
        </div>
        <button class="button-primary" type="button">Acceder</button>
        <button class="button-secondary" type="button" onclick="window.location.href='dashboard.html'">Ver panel</button>
        <p style="margin-top: 22px; color: #64748b;">¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
      </div>
    </main>
  </body>
</html>
